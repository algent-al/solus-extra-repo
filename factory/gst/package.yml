name       : gst
version    : 0.7.3
release    : 1
source     :
    - https://gitlab.com/leinardi/gst/-/archive/0.7.3/gst-0.7.3.tar.gz : 695a282929b9bcbf22b90b7dad2844a61f35dd03482cdb795b81ef1cd6c7bd30
homepage   : https://gitlab.com/leinardi/gst
license    : GPL-3.0-or-later
component  : system.utils
summary    : System utility designed to stress and monitor various hardware components
description: |
    GST (GtkStressTesting) is a GTK system utility designed to stress and monitor various hardware components like CPU and RAM.
builddeps  :
    - pkgconfig(appstream-glib)
    - pkgconfig(gtk+-3.0)
rundeps    :
    - dmidecode
    - lm_sensors
    - python-humanfriendly
    - python-injector
    - python-peewee
    - python-psutil
    - python-requests
    - python-rx
    - pyyaml
    - pyxdg
    - stress-ng
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
check      : |
    %ninja_check
