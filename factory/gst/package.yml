name       : gst
version    : 0.7.2
release    : 2
source     :
    - https://gitlab.com/leinardi/gst/-/archive/0.7.2/gst-0.7.2.tar.gz : d137c3bad133348f57409f8d241eb568e8c204aa8e39b9ac7544ec9619122046
license    : GPL-3.0-or-later
component  : system.utils
summary    : System utility designed to stress and monitor various hardware components
description: |
    GST (GtkStressTesting) is a GTK system utility designed to stress and monitor various hardware components like CPU and RAM.
builddeps  :
    - pkgconfig(appstream-glib)
    - pkgconfig(gtk+-3.0)
rundeps    :
    - dmidecode
    - lm_sensors
    - python-humanfriendly
    - python-injector
    - python-peewee
    - python-psutil
    - python-requests
    - python-rx
    - pyyaml
    - pyxdg
    - stress-ng
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
check      : |
    %ninja_check
