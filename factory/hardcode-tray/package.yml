name       : hardcode-tray
version    : 4.3
release    : 1
source     :
    - git|https://github.com/bilelmoussaoui/Hardcode-Tray : 49d149f5418803756e6c32213dc651e41911beea
homepage   : https://github.com/bilelmoussaoui/Hardcode-Tray
license    : BSD-3-Clause
component  : desktop.theme
summary    : Fixes Hardcoded tray icons in Linux 
description: |
    Fixes Hardcoded tray icons in Linux. The script will automatically detect your default theme, the correct icon size, the hard-coded applications, the correct icons for each indicator and fix them. All that with the possibility to revert to the original icons.
builddeps  :
    - pkgconfig(gtk+-3.0)
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
