    - pkgconfig(gee-0.8)
    - pkgconfig(gnome-settings-daemon)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(keybinder-3.0)
    - pkgconfig(libsoup-2.4)
    - pkgconfig(libwnck-3.0)
    - vala
rundeps    :
    - ^budgie-another-trash-applet : budgie-extras
    - ^budgie-app-launcher-applet : budgie-extras
    - ^budgie-brightness-controll-applet : budgie-extras
    - ^budgie-clockworks-applet :
        - budgie-extras
        - python-cairosvg
        - python-pillow
        - python-svgwrite
    - ^budgie-dropby-applet : 
        - budgie-extras
        - python-psutil
        - python3-pyudev
        - wmctrl
    - ^budgie-extras-daemon : budgie-extras
    - ^budgie-fuzzyclock-applet : budgie-extras
    - ^budgie-hotcorners-applet :
        - budgie-previews
        - dconf
        - xdotool
    - ^budgie-keyboard-autoswitch-applet :
        - budgie-extras
        - python-psutil
        - xdotool
        - xprop
    - ^budgie-previews : 
        - budgie-extras-daemon
        - xprintidle
    - ^budgie-quickchar :
        - budgie-extras-daemon
        - python-pyperclip
        - python-xlib
        - wmctrl
    - ^budgie-recentlyused-applet : budgie-extras
    - ^budgie-rotation-lock-applet : budgie-extras
    - ^budgie-showtime-applet : budgie-extras
    - ^budgie-takeabreak-applet :
        - budgie-extras
        - python-psutil
        - xprintidle
        - wmctrl
    - ^budgie-window-mover-applet :
        - budgie-extras
        - python-psutil
        - xdotool
        - xprop
        - wmctrl
    - ^budgie-workspace-overview-applet :
        - budgie-extras
        - python-psutil
        - xprop
        - wmctrl
    - ^budgie-workspace-stopwatch-applet : budgie-extras
    - ^budgie-workspace-wallpaper-applet :
        - budgie-extras
        - wmctrl
setup      : |
    %meson_configure \
        -Dbuild-all=false \
        -Dbuild-app-launcher=true \
        -Dbuild-brightness-controller=true \
        -Dbuild-clockworks=true \
        -Dbuild-extrasdaemon=true \
        -Dbuild-dropby=true \
        -Dbuild-fuzzyclock=true \
        -Dbuild-hotcorners=true \
        -Dbuild-keyboard-autoswitch=true \
        -Dbuild-quickchar=true \
        -Dbuild-recentlyused=true \
        -Dbuild-rotation-lock=true \
        -Dbuild-showtime=true \
        -Dbuild-takeabreak=true \
        -Dbuild-trash=true \
        -Dbuild-wmover=true \
        -Dbuild-workspacestopwatch=true \
        -Dbuild-wpreviews=true \
        -Dbuild-wsoverview=true \
        -Dbuild-wswitcher=true
build      : |
    %ninja_build
install    : |
    %ninja_install

    #These are not needed since they are already in budgie-extras to avoid conflicts.
    rm -rf $installdir/usr/share/locale
