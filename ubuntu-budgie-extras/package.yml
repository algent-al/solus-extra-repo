    - ^budgie-brightness-controll-applet : Brightness Controller is a Budgie Desktop applet for productivity.
    - ^budgie-dropby-applet : The DropBy applet pops up in the panel on the occasion of connecting a usb device
    - ^budgie-extras-daemon : This on logon process manages keyboard shortcuts delivered via .bde files for various extras-plugins
    - ^budgie-fuzzyclock-applet : Shows the time in a Fuzzy Way.
    - ^budgie-keyboard-autoswitch-applet : Keyboard Auto Switch is an applet to use a different input keyboard layout per application
    - ^budgie-quickchar-applet : Quickly find and choose the equivalent locale character for an ascii character
    - ^budgie-recentlyused-applet : Show (Gtk applications') recently used items in a menu.
    - ^budgie-rotation-lock-applet : Is an applet to an easy way to rotation lock or unlock your screen
    - ^budgie-showtime-applet : Budgie Showtime is a digital desktop clock, showing time, and optionally, date.
    - ^budgie-takeabreak-applet : Budgie TakeaBreak is a pomodoro like applet, to make sure to take regular breaks from working
    - ^budgie-wallpaper-switcher-applet : Is an application (applet) to show a different wallpaper on each of the workspaces
    - ^budgie-window-mover-applet : Budgie WindoMover is an application (applet) to quickly move windows to any of the other workspaces
    - ^budgie-workspace-overview-applet : An applet to have quick access to all windows across all workspaces
    - ^budgie-workspace-stopwatch-applet : Workspace Timer Applet is an applet to keep track of usage per workspace
description:
    - Budgie-extras from Ubuntu Budgie. Here are some applets not yet included in official Solus Repository.
    - ^budgie-another-trash-applet : Trash is a Budgie Desktop applet for productivity.
    - ^budgie-app-launcher-applet : App Launcher is a Budgie Desktop applet for productivity. This applet lists your favourite apps.
    - ^budgie-brightness-controll-applet : Brightness Controller is a Budgie Desktop applet for productivity.
    - ^budgie-dropby-applet : The DropBy applet pops up in the panel on the occasion of connecting a usb device. The applet subsequently offers the option(s) to mount, unmount/eject, and, in case of a flash drive, to make a local copy of the drive's content. The info shows the free sapace on the volume. The applet shows its icon in the panel if, and as long as, any usb drive is connected.
    - ^budgie-extras-daemon : This on logon process manages keyboard shortcuts delivered via .bde files for various extras-plugins.
    - ^budgie-fuzzyclock-applet : Shows the time in a Fuzzy Way.
    - ^budgie-keyboard-autoswitch-applet : Keyboard Auto Switch is an applet to use a different input keyboard layout per application. Simply set a default layout to be used in general. Subsequently, simply set a different layout, with the application's window in front, and an exception for that specific application is remembered. Exceptions can be removed at any time, either from the applet's menu or by setting the application's layout, again, with its window in front.
    - ^budgie-quickchar-applet : Quickly find and choose the equivalent locale character for an ascii character.
    - ^budgie-recentlyused-applet : Show (Gtk applications') recently used items in a menu.
    - ^budgie-rotation-lock-applet : Is an applet to an easy way to rotation lock or unlock your screen.
    - ^budgie-showtime-applet : Budgie Showtime is a digital desktop clock, showing time, and optionally, date. Textcolor of both can be set separately from the applet's menu.
    - ^budgie-takeabreak-applet : Budgie TakeaBreak is a pomodoro like applet, to make sure to take regular breaks from working. Options from Budgie Settings include turning the screen upside down, dim the screen, lock screen or show a countdown message on break time. The applet can be accessed quickly from the panel to temporarily switch it off.
    - ^budgie-wallpaper-switcher-applet : Is an application (applet) to show a different wallpaper on each of the workspaces. Usage is simple; add the applet to the panel and set wallpapers on each of the workspaces in the way you are used to. The applet will remember what wallpaper was set on each of the workspaces.
    - ^budgie-window-mover-applet : Budgie WindoMover is an application (applet) to quickly move windows to any of the other workspaces. Just drag a window to the bottom of the screen and a bar will popup, representing the workspaces. Click on any of the numbers (or press the corresponding number on the keyboard), and the window will move to that workspace.
    - ^budgie-workspace-overview-applet : An applet to have quick access to all windows across all workspaces
    - ^budgie-workspace-stopwatch-applet : Workspace Timer Applet is an applet to keep track of usage per workspace, e.g. to find out how much minutes/hours were actually spent on a job. Workspaces can be freely named, custom names and all data are rmembered, also after logout/restart, until the RESET button is pressed.
