        - /usr/share/pixmaps/budgie-app-launcher*
    - ^budgie-brightness-controll-applet :
        - /usr/lib64/budgie-desktop/plugins/budgie-brightness-controller
        - /usr/share/pixmaps/budgie-brightness-controller-1-symbolic.svg
